<div class="min-h-screen flex flex-col items-center justify-center p-6 bg-[#f7f9ff] slow-fade">
  <div class="text-center mb-6">
    <span class="material-symbols-outlined text-[40px] text-[#019ce4] mb-2">school</span>
    <h2 class="text-[28px] font-bold">Reset Password</h2>
    <p class="text-[14px]">Create a new, strong password for your account.</p>
  </div>

  <div class="w-full max-w-[440px] bg-white border border-[#ebeef5] rounded-[12px] p-8 shadow-sm">

    <!-- Error Message -->
    <p *ngIf="errorMessage" class="text-red-500 text-sm mb-4 text-center font-medium bg-red-50 p-2 rounded-md">{{ errorMessage }}</p>

    <!-- Success Message -->
    <p *ngIf="successMessage" class="text-green-600 text-sm mb-4 text-center flex items-center justify-center gap-1 font-medium bg-green-50 p-2 rounded-md">
      <span class="material-symbols-outlined text-[18px]">check_circle</span>
      {{ successMessage }}
    </p>

    <div class="space-y-5">
      <!-- New Password -->
      <div>
        <label class="block text-[13px] font-semibold mb-2">New Password</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#bec8d2] text-[20px]">lock</span>
          <input [(ngModel)]="newPassword" 
                 (ngModelChange)="checkPassword($event)" 
                 type="password"
                 class="w-full border border-[#bec8d2] rounded-[8px] pl-10 pr-3 py-3 text-sm outline-none focus:ring-1 focus:ring-[#019ce4] transition-colors"
                 [ngClass]="{'border-red-500 focus:ring-red-500': newPassword && strengthColor === 'text-red-500', 'border-green-500 focus:ring-green-500': strengthColor === 'text-green-500'}"
                 placeholder="Enter new password">
        </div>
        <!-- التعليق اللحظي -->
        <div *ngIf="newPassword" class="text-[11px] mt-1.5 font-bold transition-colors duration-300" [ngClass]="strengthColor">
          {{ strengthText }}
        </div>
      </div>

      <!-- Confirm New Password -->
      <div>
        <label class="block text-[13px] font-semibold mb-2">Confirm New Password</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#bec8d2] text-[20px]">lock</span>
          <input [(ngModel)]="confirmPassword" type="password"
                 class="w-full border border-[#bec8d2] rounded-[8px] pl-10 pr-3 py-3 text-sm outline-none focus:ring-1 focus:ring-[#019ce4] transition-colors"
                 [ngClass]="{'border-red-500 focus:ring-red-500': confirmPassword && newPassword !== confirmPassword && confirmPassword.length > 0}"
                 placeholder="Confirm new password">
        </div>
        <!-- تعليق لو الباسورد مش متطابق -->
        <div *ngIf="confirmPassword && newPassword !== confirmPassword" class="text-[11px] mt-1.5 font-bold text-red-500">
          Passwords do not match
        </div>
      </div>

      <button (click)="onUpdate()" [disabled]="isLoading"
              class="w-full bg-[#49a0dc] text-white py-3 rounded-[8px] font-bold hover:bg-[#019ce4] transition-all disabled:opacity-60 focus:ring-2 focus:ring-offset-2 focus:ring-[#019ce4] outline-none mt-2">
        {{ isLoading ? 'Updating...' : 'Update Password' }}
      </button>
    </div>

    <div class="mt-6 pt-4 border-t border-[#ebeef5] text-center text-[13px] text-[#3f4851]">
      Still having trouble? <span class="text-[#019ce4] font-bold cursor-pointer hover:underline">Contact Us</span>
    </div>
  </div>

  <p class="mt-6 text-[12px] text-[#3f4851] flex items-center gap-1 font-medium">
    <span class="material-symbols-outlined text-[18px] text-[#019ce4]">verified_user</span>
    Secure AES-256 Encryption & GDPR Compliant
  </p>
</div>
